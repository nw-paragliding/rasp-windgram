name: Build and publish Docker images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Image to build (wrf, windgram, or both)'
        required: false
        default: 'windgram'

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  WRF_VERSION: v4.5.2

jobs:
  # Check if wrf-compiled image already exists — skip rebuild if so
  check-wrf:
    runs-on: ubuntu-24.04
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      force: ${{ steps.force.outputs.force }}
    steps:
      - id: force
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             ([ "${{ inputs.target }}" = "wrf" ] || [ "${{ inputs.target }}" = "both" ]); then
            echo "force=true" >> $GITHUB_OUTPUT
          else
            echo "force=false" >> $GITHUB_OUTPUT
          fi

      - id: check
        run: |
          if docker manifest inspect "${REGISTRY}/wrf-compiled:${WRF_VERSION}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "wrf-compiled:${WRF_VERSION} already exists — skipping rebuild"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "wrf-compiled:${WRF_VERSION} not found — will build"
          fi

  # Build wrf-compiled for each arch natively (no QEMU)
  build-wrf:
    needs: [check-wrf]
    if: needs.check-wrf.outputs.exists == 'false' || needs.check-wrf.outputs.force == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wrf-compiled (${{ matrix.suffix }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f docker/Dockerfile.wrf \
            --build-arg WRF_VERSION="${WRF_VERSION}" \
            -t "${REGISTRY}/wrf-compiled:${WRF_VERSION}-${{ matrix.suffix }}" \
            --push .

  # Create multi-arch manifest for wrf-compiled
  manifest-wrf:
    needs: [check-wrf, build-wrf]
    if: always() && (needs.build-wrf.result == 'success' || needs.check-wrf.outputs.exists == 'true')
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest (if built)
        if: needs.build-wrf.result == 'success'
        run: |
          docker buildx imagetools create -t "${REGISTRY}/wrf-compiled:${WRF_VERSION}" \
            "${REGISTRY}/wrf-compiled:${WRF_VERSION}-amd64" \
            "${REGISTRY}/wrf-compiled:${WRF_VERSION}-arm64"

  # Build windgram for each arch natively
  build-windgram:
    needs: [manifest-wrf]
    if: always() && needs.manifest-wrf.result != 'failure'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push windgram (${{ matrix.suffix }})
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f docker/Dockerfile.windgram \
            --build-arg WRF_IMAGE="${REGISTRY}/wrf-compiled:${WRF_VERSION}-${{ matrix.suffix }}" \
            --build-arg VERSION="${VERSION}" \
            -t "${REGISTRY}/windgram:${VERSION}-${{ matrix.suffix }}" \
            --push .

  # Create multi-arch manifest for windgram
  manifest-windgram:
    needs: [build-windgram]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifests
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          docker buildx imagetools create -t "${REGISTRY}/windgram:${VERSION}" \
            "${REGISTRY}/windgram:${VERSION}-amd64" \
            "${REGISTRY}/windgram:${VERSION}-arm64"
          docker buildx imagetools create -t "${REGISTRY}/windgram:latest" \
            "${REGISTRY}/windgram:${VERSION}-amd64" \
            "${REGISTRY}/windgram:${VERSION}-arm64"
