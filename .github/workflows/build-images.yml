name: Build and publish Docker images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Image to build (wrf, windgram, or both)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-wrf:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'wrf' || inputs.target == '')
      || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wrf-compiled
        run: ./scripts/build-images.sh wrf --push
        env:
          REGISTRY: ${{ env.REGISTRY }}

  build-windgram:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'windgram' || inputs.target == '')
      || startsWith(github.ref, 'refs/tags/v')
    needs: [build-wrf]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push windgram
        run: ./scripts/build-images.sh windgram --push
        env:
          REGISTRY: ${{ env.REGISTRY }}
