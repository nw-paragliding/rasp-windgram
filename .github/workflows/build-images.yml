name: Build and publish Docker images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Image to build (wrf, windgram, or both)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  # Build wrf-compiled for each arch natively (no QEMU)
  build-wrf:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'wrf' || inputs.target == '')
      || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wrf-compiled (${{ matrix.suffix }})
        run: |
          WRF_VERSION="${WRF_VERSION:-4.5.2}"
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f docker/Dockerfile.wrf \
            --build-arg WRF_VERSION="${WRF_VERSION}" \
            -t "${REGISTRY}/wrf-compiled:${WRF_VERSION}-${{ matrix.suffix }}" \
            --push .

  # Create multi-arch manifest for wrf-compiled
  manifest-wrf:
    needs: [build-wrf]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          WRF_VERSION="${WRF_VERSION:-4.5.2}"
          docker manifest create "${REGISTRY}/wrf-compiled:${WRF_VERSION}" \
            "${REGISTRY}/wrf-compiled:${WRF_VERSION}-amd64" \
            "${REGISTRY}/wrf-compiled:${WRF_VERSION}-arm64"
          docker manifest push "${REGISTRY}/wrf-compiled:${WRF_VERSION}"

  # Build windgram for each arch natively
  build-windgram:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'windgram' || inputs.target == '')
      || startsWith(github.ref, 'refs/tags/v')
    needs: [manifest-wrf]
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push windgram (${{ matrix.suffix }})
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          WRF_VERSION="${WRF_VERSION:-4.5.2}"
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f docker/Dockerfile.windgram \
            --build-arg WRF_IMAGE="${REGISTRY}/wrf-compiled:${WRF_VERSION}-${{ matrix.suffix }}" \
            --build-arg VERSION="${VERSION}" \
            -t "${REGISTRY}/windgram:${VERSION}-${{ matrix.suffix }}" \
            --push .

  # Create multi-arch manifest for windgram
  manifest-windgram:
    needs: [build-windgram]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          docker manifest create "${REGISTRY}/windgram:${VERSION}" \
            "${REGISTRY}/windgram:${VERSION}-amd64" \
            "${REGISTRY}/windgram:${VERSION}-arm64"
          docker manifest push "${REGISTRY}/windgram:${VERSION}"

          docker manifest create "${REGISTRY}/windgram:latest" \
            "${REGISTRY}/windgram:${VERSION}-amd64" \
            "${REGISTRY}/windgram:${VERSION}-arm64"
          docker manifest push "${REGISTRY}/windgram:latest"
